# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # 🔧 升级 pnpm 到 v10.33.2（与 package.json 中的 packageManager 保持一致）
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2   # 之前是 9，现在升级
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build project
        run: pnpm run build
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'   # 根据你的实际构建输出目录修改（如 build）
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
